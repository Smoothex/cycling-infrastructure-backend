spring.application.name=cycling-infrastructure-backend
spring.jpa.hibernate.ddl-auto=update

# Set to true to see what SQL queries Hibernate executes
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/cyclingdb
spring.datasource.username=user
spring.datasource.password=password

spring.datasource.hikari.maximum-pool-size=32
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=300000
spring.datasource.hikari.pool-name=CyclingDBPool

# Performance Tuning: Batch Inserts to bundle SQL statements
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.pattern.console=%d{HH:mm:ss} %-5level %logger{15} : %msg%n

# GraphHopper Configuration
graphhopper.osm.file=./data/osm/germany-latest.osm.pbf
graphhopper.graph.location=./data/graphhopper-cache

simra.import.enabled=false
# Shortest Path Analysis Configuration
analysis.batch.enabled=false
analysis.batch.delay.ms=10000
analysis.batch.size=500
analysis.batch.thread-pool-size=8
analysis.detour.threshold=0.10
# Max distance (meters) for two geometries to be considered the same corridor
analysis.spatial.proximity-meters=20

# Weather Enrichment Configuration (Open-Meteo Historical API)
enrichment.weather.enabled=true
enrichment.weather.batch-size=100
enrichment.weather.delay-between-calls-ms=150
enrichment.weather.schedule-delay-ms=60000

